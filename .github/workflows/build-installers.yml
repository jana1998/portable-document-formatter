name: Build Installers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-installers-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS installer
        run: npm run dist:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portable-document-formatter-macos
          path: |
            release/*.dmg
            release/*.dmg.blockmap
            release/latest-mac.yml
          if-no-files-found: error

  build-windows:
    name: Build Windows EXE
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: portable-document-formatter-windows
          path: |
            release/*.exe
            release/*.exe.blockmap
            release/latest.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-macos
      - build-windows

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: portable-document-formatter-macos
          path: release-assets/macos

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: portable-document-formatter-windows
          path: release-assets/windows

      - name: Publish rolling prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-build
          name: Latest Main Build
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: |
            release-assets/macos/*
            release-assets/windows/*
          body: |
            Automated installers built from the latest push to `main`.

            This rolling prerelease is updated on each successful workflow run.
