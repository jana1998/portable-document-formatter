<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D9488;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#14B8A6;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Main rounded square background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#grad1)" filter="url(#shadow)"/>

  <!-- Document icon -->
  <!-- Outer document shape -->
  <rect x="140" y="120" width="232" height="280" rx="16" fill="white" opacity="0.95"/>

  <!-- Folded corner -->
  <path d="M 340 120 L 372 152 L 340 152 Z" fill="#F0FDFA"/>

  <!-- Lines representing text -->
  <line x1="180" y1="200" x2="332" y2="200" stroke="#0D9488" stroke-width="8" stroke-linecap="round" opacity="0.8"/>
  <line x1="180" y1="240" x2="332" y2="240" stroke="#14B8A6" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  <line x1="180" y1="280" x2="280" y2="280" stroke="#14B8A6" stroke-width="8" stroke-linecap="round" opacity="0.6"/>

  <!-- Edit pencil icon in bottom right -->
  <g transform="translate(300, 320)">
    <circle cx="25" cy="25" r="28" fill="#0D9488"/>
    <path d="M 15 30 L 15 35 L 20 35 L 35 20 L 30 15 Z" fill="white" stroke="white" stroke-width="1"/>
    <circle cx="33" cy="17" r="3" fill="white"/>
  </g>
</svg>
